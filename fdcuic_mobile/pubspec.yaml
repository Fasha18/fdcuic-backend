name: fdcuic_mobile
description: A premium and modern Flutter mobile application for FDCUIC.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Routing
  go_router: ^13.2.0
  
  # Network
  dio: ^5.4.1
  
  # Typography & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  glassmorphism: ^3.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Utility
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
